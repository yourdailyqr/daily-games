<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Your Daily Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

/* Use smallest available viewport unit to account for browser chrome/address bar */
html,body{
  width:100%;height:100%;
  background:#0a0a1a;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

.page{
  width:100%;
  max-width:430px;
  /* svh = smallest viewport height = stays within visible area even with browser UI */
  height:100svh;
  height:100dvh; /* fallback for older browsers */
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto;
}

.qr-card{
  width:100%;
  max-width:430px;
  height:100%;
  display:flex;flex-direction:column;
  overflow:hidden;
  position:relative;
  font-family:"Nunito",sans-serif;
}

.bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  z-index:0;filter:blur(1.5px);transform:scale(1.03);
}

.scrim{
  position:absolute;
  /* Use svh-aware positioning so scrim stays inside visible area */
  left:4%;top:4%;
  width:92%;
  /* height uses svh: scrim is 92% of the smallest viewport so it never overflows */
  height:92svh;
  max-height:92%;
  border-radius:28px;
  background:rgba(0,0,0,0.50);
  z-index:1;
  display:flex;flex-direction:column;
  overflow:hidden;
}

/* ── HEADER ── */
.header{
  padding:clamp(8px,2vh,16px) 16px clamp(4px,1vh,8px);
  text-align:center;
  flex-shrink:0;
}
.game-label{
  font-family:"Fredoka One",cursive;
  font-size:clamp(10px,1.8vw,15px);
  letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,0.6);margin-bottom:2px;
}
.game-title{
  font-family:"Fredoka One",cursive;
  font-size:clamp(22px,7vw,36px);
  color:#fff;text-shadow:0 2px 16px rgba(0,0,0,0.7);line-height:1.1;
}
.date-line{
  font-size:clamp(10px,2.5vw,14px);
  color:rgba(255,255,255,0.6);margin-top:2px;font-weight:600;
}

/* ── GAME AREA ── */
.game-area{
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:2px clamp(8px,4vw,16px);
  overflow:hidden;
  min-height:0; /* critical: lets flexbox shrink this */
}

.status-msg{
  font-size:clamp(12px,3.5vw,15px);
  font-weight:700;color:#ffd700;text-align:center;
  min-height:18px;margin-bottom:clamp(4px,1.2vh,7px);
  text-shadow:0 1px 6px rgba(0,0,0,0.7);
}

/* Shared button base */
.play-again-btn,.roll-btn,.stand-btn,.ws-submit{
  border-radius:20px;
  font-family:"Nunito",sans-serif;
  font-size:clamp(12px,3vw,14px);
  font-weight:800;
  padding:clamp(5px,1.2vh,7px) clamp(14px,5vw,24px);
  cursor:pointer;
  margin-top:clamp(5px,1.2vh,8px);
  transition:all 0.15s;
  white-space:nowrap;
}
.play-again-btn{background:rgba(255,215,0,0.18);border:1.5px solid rgba(255,215,0,0.5);color:#ffd700;}
.play-again-btn:hover{background:rgba(255,215,0,0.28);}
.roll-btn{background:rgba(78,205,196,0.18);border:1.5px solid rgba(78,205,196,0.5);color:#4ecdc4;}
.roll-btn:hover{background:rgba(78,205,196,0.28);}
.stand-btn{background:rgba(255,107,107,0.18);border:1.5px solid rgba(255,107,107,0.5);color:#ff6b6b;}
.stand-btn:hover{background:rgba(255,107,107,0.28);}
.ws-submit{background:rgba(78,205,196,0.15);border:1.5px solid rgba(78,205,196,0.5);color:#4ecdc4;}
.ws-submit:hover{background:rgba(78,205,196,0.28);}

/* ── FOOTER ── */
.footer{
  padding:clamp(6px,1.5vh,10px) 16px clamp(8px,2vh,16px);
  flex-shrink:0;text-align:center;
}
.nav-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:4px;}
.nav-btn{
  background:none;border:none;cursor:pointer;
  color:rgba(255,255,255,0.8);
  font-size:clamp(18px,5vw,26px);
  padding:4px 8px;transition:color 0.15s;
}
.nav-btn:hover:not(:disabled){color:#fff;}
.nav-btn:disabled{color:rgba(255,255,255,0.2);cursor:default;}
.nav-label{
  font-family:"Fredoka One",cursive;
  font-size:clamp(14px,4vw,19px);
  color:rgba(255,255,255,0.8);min-width:110px;
  text-align:center;text-shadow:0 1px 4px rgba(0,0,0,0.5);
}
.site-link{
  display:block;
  font-size:clamp(11px,3vw,15px);
  color:rgba(255,255,255,0.5);text-decoration:none;letter-spacing:1px;
}

/* ── TTT ── */
.ttt-board{
  display:grid;
  grid-template-columns:repeat(3,clamp(72px,20vw,96px));
  grid-template-rows:repeat(3,clamp(72px,20vw,96px));
  gap:clamp(4px,1.5vw,7px);
}
.ttt-cell{
  background:#7a9bbf;border:1.5px solid #9ab8d6;
  border-radius:12px;cursor:pointer;font-family:"Fredoka One",cursive;
  font-size:clamp(30px,9vw,44px);
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s,transform 0.1s;color:#fff;
}
.ttt-cell:hover:not(.taken){background:#9ab8d6;transform:scale(1.05);}
.ttt-cell.x{color:#ff6b6b;}.ttt-cell.o{color:#4ecdc4;}
.ttt-cell.win-cell{background:rgba(255,215,0,0.25);border-color:#ffd700;}

/* ── MEMORY ── */
.memory-board{
  display:grid;
  grid-template-columns:repeat(4,clamp(52px,15vw,68px));
  grid-template-rows:repeat(4,clamp(52px,15vw,68px));
  gap:clamp(3px,1.2vw,6px);
  margin:0 auto;
}
.mem-card{
  perspective:600px;cursor:pointer;
  width:clamp(52px,15vw,68px);height:clamp(52px,15vw,68px);
}
.mem-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.35s;border-radius:10px;}
.mem-card.flipped .mem-inner,.mem-card.matched .mem-inner{transform:rotateY(180deg);}
.mem-front,.mem-back{position:absolute;inset:0;border-radius:10px;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;}
.mem-front{background:#1e3a5f;border:1.5px solid #2a5080;font-size:clamp(16px,4.5vw,24px);}
.mem-back{background:#1e3a5f;border:1.5px solid #2a5080;transform:rotateY(180deg);font-size:clamp(18px,5vw,28px);}
.mem-card.matched .mem-back{background:#0d3d3a;border-color:#4ecdc4;}
.timer-wrap{width:100%;margin-bottom:5px;}
.timer-bar-bg{width:100%;height:8px;background:rgba(255,255,255,0.12);border-radius:4px;overflow:hidden;}
.timer-bar-fill{height:100%;border-radius:4px;transition:width 1s linear,background 1s;background:#4ecdc4;}
.timer-label{font-size:clamp(10px,2.5vw,12px);color:rgba(255,255,255,0.5);text-align:right;margin-top:2px;}
.ribbon-display{text-align:center;padding:6px 0;}
.ribbon-icon{font-size:clamp(40px,12vw,56px);line-height:1;margin-bottom:4px;}
.ribbon-name{font-family:"Fredoka One",cursive;font-size:clamp(20px,6vw,28px);margin-bottom:3px;}
.ribbon-sub{font-size:clamp(11px,3vw,14px);color:rgba(255,255,255,0.6);}

/* ── RPS ── */
.rps-score{display:flex;justify-content:center;gap:clamp(16px,5vw,28px);margin-bottom:6px;}
.rps-score-item{text-align:center;}
.rps-score-label{font-size:clamp(10px,2.5vw,12px);color:rgba(255,255,255,0.5);letter-spacing:1px;text-transform:uppercase;}
.rps-score-num{font-family:"Fredoka One",cursive;font-size:clamp(22px,7vw,32px);color:#fff;line-height:1;}
.rps-display{display:flex;align-items:center;justify-content:center;gap:clamp(12px,4vw,20px);margin:5px 0;}
.rps-pick{
  width:clamp(62px,18vw,82px);height:clamp(62px,18vw,82px);
  background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.2);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:clamp(28px,8vw,40px);
}
.rps-pick.player{border-color:rgba(255,107,107,0.6);}.rps-pick.cpu{border-color:rgba(78,205,196,0.6);}
.rps-pick-label{font-size:clamp(9px,2.2vw,11px);color:rgba(255,255,255,0.5);margin-top:3px;text-align:center;}
.rps-vs{font-family:"Fredoka One",cursive;font-size:clamp(16px,4.5vw,22px);color:rgba(255,255,255,0.35);}
.rps-buttons{display:flex;gap:clamp(8px,2.5vw,12px);justify-content:center;margin-top:6px;}
.rps-btn{
  width:clamp(58px,16vw,76px);height:clamp(58px,16vw,76px);
  background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.25);
  border-radius:50%;font-size:clamp(24px,7vw,34px);cursor:pointer;
  transition:all 0.15s;display:flex;align-items:center;justify-content:center;
}
.rps-btn:hover{background:rgba(255,255,255,0.2);transform:scale(1.1);}

/* ── OLD MAID ── */
.om-hand{display:flex;flex-wrap:wrap;justify-content:center;gap:3px;max-width:340px;margin:0 auto;}
.om-card{
  width:clamp(34px,9vw,44px);height:clamp(50px,13vw,64px);
  border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  border:1.5px solid rgba(255,255,255,0.25);transition:transform 0.15s,border-color 0.15s;
}
.om-card.face-up{background:#1e3a5f;}.om-card.face-down{background:#0d2540;}
.om-card:hover{transform:translateY(-6px);border-color:rgba(255,215,0,0.6);}

/* ── HANGMAN ── */
.hm-figure-wrap{width:clamp(90px,26vw,120px);height:clamp(82px,24vw,110px);position:relative;margin:0 auto 4px;}
.hm-svg{width:100%;height:100%;}
.hangman-word{display:flex;gap:clamp(4px,1.5vw,7px);justify-content:center;flex-wrap:wrap;margin:8px 0 10px;}
.hangman-letter{
  width:clamp(20px,5.5vw,26px);height:clamp(26px,7vw,33px);
  border-bottom:2.5px solid rgba(255,255,255,0.5);
  display:flex;align-items:flex-end;justify-content:center;
  font-family:"Fredoka One",cursive;font-size:clamp(15px,4.5vw,20px);color:#fff;
}
.hangman-keys{display:flex;flex-wrap:wrap;justify-content:center;gap:clamp(3px,1vw,4px);max-width:300px;}
.hkey{
  width:clamp(24px,6.5vw,28px);height:clamp(24px,6.5vw,28px);
  background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:6px;
  color:#fff;font-family:"Nunito",sans-serif;font-size:clamp(10px,2.8vw,12px);font-weight:700;
  cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;
}
.hkey:hover:not(:disabled){background:rgba(255,255,255,0.22);}.hkey:disabled{opacity:0.2;cursor:default;}
.hkey.wrong{background:rgba(255,107,107,0.2);border-color:rgba(255,107,107,0.5);color:#ff6b6b;}
.hkey.right{background:rgba(78,205,196,0.2);border-color:rgba(78,205,196,0.5);color:#4ecdc4;}

/* ── SLOT ── */
.slot-reels{display:flex;gap:clamp(6px,2vw,10px);justify-content:center;}
.slot-reel{
  width:clamp(60px,17vw,76px);height:clamp(68px,19vw,86px);
  background:#1e3a5f;border:1.5px solid #2a5080;
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:clamp(32px,9vw,42px);overflow:hidden;transition:transform 0.04s;
}
.slot-lever{
  width:clamp(48px,13vw,60px);height:clamp(48px,13vw,60px);
  background:#3d1a1a;border:1.5px solid #ff6b6b;
  border-radius:50%;font-size:clamp(22px,6vw,30px);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;margin:4px auto;
}
.slot-lever:hover{background:rgba(255,107,107,0.28);transform:scale(1.05);}
.slot-credits{font-family:"Fredoka One",cursive;font-size:clamp(16px,4.5vw,20px);color:#ffd700;text-align:center;margin-bottom:3px;}

/* ── HIGHER LOWER ── */
.hl-card{
  width:clamp(76px,21vw,96px);height:clamp(100px,27vw,126px);
  background:#8a9ab0;border:1.5px solid #b0bec5;
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-family:"Fredoka One",cursive;font-size:clamp(22px,6vw,28px);color:#fff;margin:4px auto;
}
.hl-buttons{display:flex;gap:clamp(10px,3vw,14px);justify-content:center;margin-top:7px;}
.hl-btn{
  padding:clamp(7px,1.8vh,9px) clamp(16px,5vw,22px);
  border-radius:20px;font-family:"Fredoka One",cursive;
  font-size:clamp(14px,4vw,17px);cursor:pointer;border:1.5px solid;transition:all 0.15s;
}
.hl-btn.higher{background:rgba(78,205,196,0.15);border-color:rgba(78,205,196,0.5);color:#4ecdc4;}
.hl-btn.lower{background:rgba(255,107,107,0.15);border-color:rgba(255,107,107,0.5);color:#ff6b6b;}
.hl-btn:hover{transform:scale(1.05);}
.hl-score{font-family:"Fredoka One",cursive;font-size:clamp(18px,5vw,24px);color:#ffd700;text-align:center;}

/* ── DICE POKER ── */
.dp-section-label{font-family:"Fredoka One",cursive;font-size:clamp(11px,2.8vw,13px);color:rgba(255,255,255,0.5);text-align:center;letter-spacing:1px;margin-bottom:3px;}
.dice-row{display:flex;gap:clamp(5px,1.5vw,7px);justify-content:center;flex-wrap:wrap;}
.die{
  width:clamp(42px,12vw,54px);height:clamp(42px,12vw,54px);
  background:rgba(255,255,255,0.88);border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(22px,6.5vw,30px);cursor:pointer;
  border:2.5px solid transparent;transition:all 0.15s;color:#1a1a2e;
}
.die.held{border-color:#ffd700;background:rgba(255,215,0,0.9);}.die:hover{transform:scale(1.08);}
.die.house-die{cursor:default;background:rgba(255,107,107,0.15);border-color:rgba(255,107,107,0.3);color:#fff;}

/* ── SIMON ── */
.simon-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:clamp(6px,2vw,9px);
  width:clamp(190px,55vw,244px);
  margin:0 auto;
}
.simon-btn{
  height:clamp(74px,21vw,94px);
  border-radius:16px;border:none;cursor:pointer;transition:all 0.15s;opacity:0.45;
}
.simon-btn.lit{opacity:1;transform:scale(1.04);}.simon-btn:hover{opacity:0.65;}
.simon-btn[data-s="0"]{background:#ff6b6b;}.simon-btn[data-s="1"]{background:#4ecdc4;}
.simon-btn[data-s="2"]{background:#ffd700;}.simon-btn[data-s="3"]{background:#a29bfe;}
.simon-level{font-family:"Fredoka One",cursive;font-size:clamp(16px,4.5vw,20px);color:#ffd700;text-align:center;margin-bottom:5px;}

/* ── WORD SCRAMBLE ── */
.ws-scramble{
  font-family:"Fredoka One",cursive;
  font-size:clamp(20px,7vw,30px);
  color:#fff;letter-spacing:clamp(4px,2vw,9px);
  text-align:center;margin:5px 0;text-shadow:0 2px 8px rgba(0,0,0,0.5);
}
.ws-input{
  background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.25);
  border-radius:12px;color:#fff;font-family:"Fredoka One",cursive;
  font-size:clamp(18px,5.5vw,24px);text-align:center;
  padding:8px 12px;width:clamp(160px,55vw,210px);
  letter-spacing:clamp(2px,1.5vw,4px);outline:none;
}
.ws-input::placeholder{color:rgba(255,255,255,0.2);}

/* ── HANGMAN ANIMATION ── */
@keyframes scrambleOff{
  0%{transform:translate(0,0) rotate(0deg);opacity:1;}
  40%{transform:translate(var(--tx),var(--ty)) rotate(var(--tr));opacity:0.7;}
  100%{transform:translate(calc(var(--tx)*3),calc(var(--ty)*3)) rotate(calc(var(--tr)*2));opacity:0;}
}
.hm-part.scramble{animation:scrambleOff 0.8s ease-in forwards;}

/* ── SCORE DISPLAY ── */
.score-display{font-size:clamp(11px,2.8vw,13px);color:rgba(255,255,255,0.5);margin-bottom:3px;text-align:center;}
</style>
</head>
<body>
<div class="page">
<div class="qr-card">
  <div class="bg" id="bgEl"></div>
  <div class="scrim">
    <div class="header">
      <div class="game-label">Your Daily Game</div>
      <div class="game-title" id="gameTitle">Game</div>
      <div class="date-line" id="dateLine"></div>
    </div>
    <div class="game-area" id="gameArea"></div>
    <div class="footer">
      <div class="nav-row">
        <button class="nav-btn" id="navLeft" onclick="changeDay(-1)">&#9664;</button>
        <span class="nav-label" id="navLabel">TODAY</span>
        <button class="nav-btn" id="navRight" onclick="changeDay(1)" disabled>&#9654;</button>
      </div>
      <a class="site-link" href="https://www.yourdailyqr.com">www.yourdailyqr.com</a>
    </div>
  </div>
</div>

function getDOY(d){var s=new Date(d.getFullYear(),0,0);return Math.floor((d-s)/86400000);}
function getGame(d){var dt=new Date();dt.setDate(dt.getDate()+d);return getDOY(dt)%10;}

function updateDate(){

}
function changeDay(d){curDay=Math.max(-999,Math.min(0,curDay+d));updateDate();launch(getGame(curDay));}
function launch(i){
  document.getElementById('gameTitle').textContent=GNAMES[i];
  document.getElementById('bgEl').style.backgroundImage='url('+GIMGS[i]+')';
  [renderTTT,renderMemory,renderRPS,renderOldMaid,renderHangman,renderSlot,renderHL,renderDP,renderSimon,renderWS][i]();
}

/* TTT */
var TB,TD;
function renderTTT(){TB=Array(9).fill('');TD=false;document.getElementById('gameArea').innerHTML='<div style="display:flex;flex-direction:column;align-items:center;"><div class="status-msg" id="tS">Your turn — you are X</div><div class="ttt-board" id="tB"></div><button class="play-again-btn" onclick="renderTTT()">New Game</button></div>';drawTTT();}
function drawTTT(){var b=document.getElementById('tB');if(!b)return;b.innerHTML='';TB.forEach(function(v,i){var c=document.createElement('div');c.className='ttt-cell'+(v?' taken '+v.toLowerCase():'');c.textContent=v;if(!v&&!TD)c.onclick=(function(x){return function(){tttMove(x);};})(i);b.appendChild(c);});}
function tttMove(i){
  if(TB[i]||TD)return;
  TB[i]='X';var w=tttWin(TB);
  if(w){TD=true;drawTTT();tttHL(w);document.getElementById('tS').textContent='You win! 🎉';return;}
  if(TB.every(Boolean)){TD=true;drawTTT();document.getElementById('tS').textContent='Draw!';return;}
  document.getElementById('tS').textContent='House thinking...';drawTTT();
  setTimeout(function(){
    var m=Math.random()<0.5?mmove():emove();
    TB[m]='O';var w2=tttWin(TB);
    if(w2){TD=true;drawTTT();tttHL(w2);document.getElementById('tS').textContent='House wins! 😅';}
    else if(TB.every(Boolean)){TD=true;drawTTT();document.getElementById('tS').textContent='Draw!';}
    else{document.getElementById('tS').textContent='Your turn — you are X';drawTTT();}
  },450);
}
function emove(){var e=TB.map(function(v,i){return v?null:i;}).filter(function(x){return x!==null;});return e[Math.floor(Math.random()*e.length)];}
function mmove(){var best=-99,bi=0;for(var i=0;i<9;i++){if(!TB[i]){TB[i]='O';var s=mm(TB,false,0);TB[i]='';if(s>best){best=s;bi=i;}}}return bi;}
function mm(b,mx,d){
  var w=tttWin(b);if(w)return b[w[0]]==='O'?10-d:d-10;
  if(b.every(Boolean))return 0;
  var best=mx?-99:99;
  for(var i=0;i<9;i++){if(!b[i]){b[i]=mx?'O':'X';var s=mm(b,!mx,d+1);b[i]='';if(mx&&s>best)best=s;if(!mx&&s<best)best=s;}}
  return best;
}
function tttWin(b){var L=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];for(var i=0;i<L.length;i++){var l=L[i];if(b[l[0]]&&b[l[0]]===b[l[1]]&&b[l[0]]===b[l[2]])return l;}return null;}
function tttHL(l){var c=document.querySelectorAll('.ttt-cell');l.forEach(function(i){if(c[i])c[i].classList.add('win-cell');});}

/* MEMORY */
var MC,MF,MM,ML,MT,MS,MST;
function renderMemory(){
  clearInterval(MT);
  var em=EMOJIS.concat(EMOJIS).sort(function(){return Math.random()-0.5;});
  MC=em.map(function(e,i){return{id:i,e:e,f:false,m:false};});
  MF=[];MM=0;ML=false;MS=60;MST=false;
  document.getElementById('gameArea').innerHTML='<div style="width:100%;display:flex;flex-direction:column;align-items:center;"><div class="timer-wrap" style="width:300px;"><div class="timer-bar-bg"><div class="timer-bar-fill" id="tF" style="width:100%"></div></div><div class="timer-label" id="tL">60s — flip a card to start!</div></div><div style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:4px;" id="mSc">Matches: 0 / 8</div><div class="status-msg" id="mSt">Find all matching pairs!</div><div class="memory-board" id="mB"></div><button class="play-again-btn" onclick="renderMemory()">New Game</button></div>';
  drawMem();
}
function startMT(){
  if(MST)return;MST=true;
  MT=setInterval(function(){
    MS--;
    var f=document.getElementById('tF'),l=document.getElementById('tL');
    if(f){f.style.width=(MS/60*100)+'%';f.style.background=MS>30?'#4ecdc4':MS>15?'#ffd700':'#ff6b6b';}
    if(l)l.textContent=MS+'s remaining';
    if(MS<=0){clearInterval(MT);ML=true;showRib(null,0);}
  },1000);
}
function drawMem(){
  var b=document.getElementById('mB');if(!b)return;b.innerHTML='';
  MC.forEach(function(c,i){
    var d=document.createElement('div');
    d.className='mem-card'+(c.f?' flipped':'')+(c.m?' matched':'');
    d.innerHTML='<div class="mem-inner"><div class="mem-front">?</div><div class="mem-back">'+c.e+'</div></div>';
    if(!c.m)d.onclick=(function(x){return function(){memFlip(x);};})(i);
    b.appendChild(d);
  });
}
function memFlip(i){
  if(ML||MC[i].f||MC[i].m)return;
  startMT();MC[i].f=true;MF.push(i);drawMem();
  if(MF.length===2){
    ML=true;var a=MF[0],bx=MF[1];
    if(MC[a].e===MC[bx].e){
      MC[a].m=MC[bx].m=true;MM++;
      var sc=document.getElementById('mSc');if(sc)sc.textContent='Matches: '+MM+' / 8';
      MF=[];ML=false;
      if(MM===8){clearInterval(MT);showRib(60-MS,MS);}
      else{var st=document.getElementById('mSt');if(st)st.textContent='Match! Keep going!';drawMem();}
    }else{
      var st2=document.getElementById('mSt');if(st2)st2.textContent='No match — try again!';
      setTimeout(function(){MC[a].f=MC[bx].f=false;MF=[];ML=false;var st3=document.getElementById('mSt');if(st3)st3.textContent='Find all matching pairs!';drawMem();},900);
    }
  }
}
function showRib(t,sl){
  var ar=document.getElementById('gameArea');if(!ar)return;
  var icon,name,col,sub;
  if(sl===0&&MM<8){icon='⏰';name="Time's Up!";col='rgba(255,255,255,0.8)';sub='Found '+MM+' of 8 pairs';}
  else if(t<=30){icon='🎀';name='Blue Ribbon!';col='#60b4ff';sub='Blazing fast — '+t+'s!';}
  else if(t<=50){icon='🎀';name='Red Ribbon!';col='#ff6b6b';sub='Nice work — '+t+'s!';}
  else{icon='🎀';name='White Ribbon!';col='rgba(255,255,255,0.9)';sub='You finished — '+t+'s!';}
  ar.innerHTML='<div class="ribbon-display"><div class="ribbon-icon">'+icon+'</div><div class="ribbon-name" style="color:'+col+'">'+name+'</div><div class="ribbon-sub">'+sub+'</div></div><button class="play-again-btn" onclick="renderMemory()">Play Again</button>';
}

/* RPS */
var RS,RR,RD;
function renderRPS(){
  RS={p:0,c:0};RR=1;RD=false;
  document.getElementById('gameArea').innerHTML='<div style="width:100%;text-align:center;"><div class="rps-score"><div class="rps-score-item"><div class="rps-score-label">You</div><div class="rps-score-num" id="rY">0</div></div><div class="rps-score-item"><div class="rps-score-label" style="color:rgba(255,215,0,0.7)">Round</div><div class="rps-score-num" id="rR" style="color:#ffd700">1</div></div><div class="rps-score-item"><div class="rps-score-label">House</div><div class="rps-score-num" id="rC">0</div></div></div><div class="status-msg" id="rS">Pick your throw!</div><div class="rps-display"><div><div class="rps-pick player" id="rPP">❓</div><div class="rps-pick-label">You</div></div><div class="rps-vs">VS</div><div><div class="rps-pick cpu" id="rCP">❓</div><div class="rps-pick-label">House</div></div></div><div class="rps-buttons" id="rBtns"><button class="rps-btn" onclick="rpsP(0)">🪨</button><button class="rps-btn" onclick="rpsP(1)">📄</button><button class="rps-btn" onclick="rpsP(2)">✂️</button></div></div><button class="play-again-btn" onclick="renderRPS()">New Game</button>';
}
function rpsP(c){
  if(RD)return;
  var cpu=Math.floor(Math.random()*3);
  var sy=['🪨','📄','✂️'];
  var pp=document.getElementById('rPP');
  var cp=document.getElementById('rCP');
  pp.textContent=sy[c]; cp.textContent=sy[cpu];
  pp.style.background='#1e3a5f'; pp.style.borderColor='#2a5080';
  cp.style.background='#1e3a5f'; cp.style.borderColor='#2a5080';
  var r=c===cpu?'d':(c===0&&cpu===2)||(c===1&&cpu===0)||(c===2&&cpu===1)?'w':'l';
  if(r==='w'){RS.p++;document.getElementById('rS').textContent='You win this round! 🎉';}
  else if(r==='l'){RS.c++;document.getElementById('rS').textContent='House wins this round! 😅';}
  else document.getElementById('rS').textContent='Draw — no point!';

/* OLD MAID */
var OP,OC,OD,OM_LOCKED;
function buildDeck(){var d=[];SUITS.forEach(function(s){RANKS.forEach(function(r){d.push({r:r,s:s});});});d.push({r:'👵',s:'',om:true});return d.sort(function(){return Math.random()-0.5;});}
function rmPairs(h){var ch=true;while(ch){ch=false;for(var i=0;i<h.length&&!ch;i++){for(var j=i+1;j<h.length&&!ch;j++){if(!h[i].om&&!h[j].om&&h[i].r===h[j].r){h.splice(j,1);h.splice(i,1);ch=true;}}}}}
function renderOldMaid(){var d=buildDeck();OP=d.filter(function(_,i){return i%2===0;});OC=d.filter(function(_,i){return i%2===1;});rmPairs(OP);rmPairs(OC);OD=false;OM_LOCKED=false;drawOM();}

function drawOM(){
  var ar=document.getElementById('gameArea');
  if(OD){
    var lose=OP.some(function(c){return c.om;});
    ar.innerHTML='<div style="text-align:center;"><div class="ribbon-icon">👵</div><div class="ribbon-name" style="color:'+(lose?'#ff6b6b':'#4ecdc4')+'">'+(lose?'You have the Old Maid! 😅':'You Win! 🎉')+'</div><div class="ribbon-sub">'+(lose?'Better luck next time!':'House got stuck with it!')+'</div></div><button class="play-again-btn" onclick="renderOldMaid()">New Game</button>';
    return;
  }
  ar.innerHTML=
    '<div style="width:100%;text-align:center;">'+

    '<div style="font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:3px;">House: '+OC.length+' cards</div>'+
    '<div class="om-hand" id="oCR" style="margin-bottom:8px;min-height:64px;"></div>'+
    '<div style="font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:3px;">Your hand: '+OP.length+' cards</div>'+
    '<div class="om-hand" id="oPR"></div>'+
    '</div>'+
    '<button class="play-again-btn" onclick="renderOldMaid()">New Game</button>';

  var cr=document.getElementById('oCR');
  OC.forEach(function(c,i){
    var d=document.createElement('div');d.className='om-card face-down';
    d.innerHTML='<span style="font-size:26px;">🂠</span>';
    d.onclick=(function(x){return function(){omDraw(x);};})(i);
    cr.appendChild(d);
  });
  var pr=document.getElementById('oPR');
  OP.forEach(function(c){
    var d=document.createElement('div');d.className='om-card face-up';
    d.innerHTML='<span style="font-size:12px;color:'+(c.s==='♥'||c.s==='♦'?'#ff8888':'#fff')+'">'+c.r+c.s+'</span>';
    pr.appendChild(d);
  });
}

function omDraw(i){
  if(OM_LOCKED)return;
  OM_LOCKED=true;

  // Reveal the drawn card face-up, lifted
  var cr=document.getElementById('oCR');
  if(cr){
    var drawnCardEl=cr.querySelectorAll('.om-card')[i];
    if(drawnCardEl){
      var dr_preview=OC[i];
      drawnCardEl.innerHTML='<span style="font-size:'+(dr_preview.om?'22px':'12px')+';color:'+(dr_preview.om?'#ff6b6b':(dr_preview.s==='♥'||dr_preview.s==='♦'?'#ff8888':'#fff'))+';transition:all 0.2s;">'+(dr_preview.om?'👵':dr_preview.r+dr_preview.s)+'</span>';
      drawnCardEl.style.background='rgba(255,255,255,0.18)';
      drawnCardEl.style.borderColor=dr_preview.om?'#ff6b6b':'rgba(255,215,0,0.6)';
      drawnCardEl.style.transform='translateY(-8px) scale(1.15)';
    }
  }

  // After showing the card for a moment, process the draw and do house turn
  setTimeout(function(){
    var dr=OC.splice(i,1)[0];
    OP.push(dr);
    rmPairs(OP);
    if(OC.length===0||OP.length===0){OD=true;drawOM();return;}

    // House's turn — show status then pick
    var st=document.getElementById('oS');
    if(st)st.textContent='House is choosing...';

    setTimeout(function(){
      if(OP.length===0){OD=true;drawOM();return;}
      var ri=Math.floor(Math.random()*OP.length);
      // Highlight chosen card in player's hand
      var pr=document.getElementById('oPR');
      if(pr){
        var cards=pr.querySelectorAll('.om-card');
        if(cards[ri]){
          cards[ri].style.transition='all 0.15s';
          cards[ri].style.background='rgba(78,205,196,0.55)';
          cards[ri].style.borderColor='#4ecdc4';
          cards[ri].style.transform='translateY(-10px) scale(1.1)';
          setTimeout(function(){
            if(cards[ri]){cards[ri].style.opacity='0';cards[ri].style.transform='translateY(-20px) scale(0.8)';}
            setTimeout(function(){
              OC.push(OP.splice(ri,1)[0]);
              rmPairs(OC);
              if(OC.length===0||OP.length===0){OD=true;drawOM();return;}
              OM_LOCKED=false;
              drawOM();
            },400);
          },600);
          return;
        }
      }
      // fallback
      OC.push(OP.splice(ri,1)[0]);
      rmPairs(OC);
      if(OC.length===0||OP.length===0){OD=true;drawOM();return;}
      OM_LOCKED=false;
      drawOM();
    },900);
  },800);
}

/* SLOT — with animated credit counter */
var SC,SP,SC_DISPLAYED;

function animateCredits(from, to, el, cb){
  if(from===to){if(cb)cb();return;}
  var step=from<to?1:-1;
  var cur=from;
  var iv=setInterval(function(){
    cur+=step;
    if(el)el.textContent='Credits: '+cur;
    if(cur===to){clearInterval(iv);SC_DISPLAYED=to;if(cb)cb();}
  }, from<to?80:60);
}

function renderSlot(){SC=10;SC_DISPLAYED=10;SP=false;drawSlot(['🍒','🍒','🍒'],'Pull the lever to spin!');}

function drawSlot(r,msg){
  document.getElementById('gameArea').innerHTML=
    '<div style="text-align:center;width:100%;">'+
    '<div class="slot-credits" id="slotCreds">Credits: '+SC+'</div>'+
    '<div class="status-msg" style="margin-bottom:14px;">'+msg+'</div>'+
    '<div class="slot-reels" style="margin-bottom:14px;"><div class="slot-reel" id="s0">'+r[0]+'</div><div class="slot-reel" id="s1">'+r[1]+'</div><div class="slot-reel" id="s2">'+r[2]+'</div></div>'+
    '<div class="slot-lever" onclick="spin()">🎰</div>'+
    (SC<=0?'<button class="play-again-btn" onclick="renderSlot()">New Game</button>':'')+
    '</div>';
}

function spinReel(reelEl, finalSymbol, duration, cb){
  var steps=Math.round(duration/80);
  var count=0;
  var iv=setInterval(function(){
    reelEl.textContent=SLOTS[Math.floor(Math.random()*SLOTS.length)];
    reelEl.style.transform='translateY(-4px)';
    setTimeout(function(){reelEl.style.transform='translateY(0)';},40);
    count++;
    if(count>=steps){clearInterval(iv);reelEl.textContent=finalSymbol;reelEl.style.transform='translateY(0)';if(cb)cb();}
  },80);
}

function spin(){
  if(SP||SC<=0)return;
  var prevSC=SC;
  SC--;SP=true;
  var res=[SLOTS[Math.floor(Math.random()*6)],SLOTS[Math.floor(Math.random()*6)],SLOTS[Math.floor(Math.random()*6)]];
  var reels=[document.getElementById('s0'),document.getElementById('s1'),document.getElementById('s2')];
  var done=0;
  [900,1200,1550].forEach(function(dur,i){
    spinReel(reels[i],res[i],dur,function(){
      done++;
      if(done===3){
        var win=0,msg;
        if(res[0]===res[1]&&res[1]===res[2]){win=res[0]==='💎'?20:10;msg=(win===20?'JACKPOT! 💎💎💎':'Three of a kind!')+' +'+win+' credits!';}
        else if(res[0]===res[1]||res[1]===res[2]||res[0]===res[2]){win=3;msg='Pair! +3 credits!';}
        else msg='No match. Try again!';
        SC+=win;
        var msgEl=document.querySelector('.status-msg');
        if(msgEl)msgEl.textContent=msg;
        setTimeout(function(){
          var el=document.getElementById('slotCreds');
          animateCredits(prevSC,SC,el,function(){SP=false;if(SC<=0)drawSlot(res,msg);});
        },900);
      }
    });
  });
}

/* DICE POKER vs HOUSE */
var DD,DH,DR,HHOUSE,DPPHASE;
function renderDP(){
  DD=[1,1,1,1,1];DH=[false,false,false,false,false];DR=3;HHOUSE=[];DPPHASE='rolling';
  dpRoll(true);
}
function dpRoll(first){
  if(!first)DR--;
  DD=DD.map(function(v,i){return DH[i]?v:Math.floor(Math.random()*6)+1;});
  drawDP();
}
function drawDP(){
  var hand=dpHand(DD);
  var baseBtn='border-radius:20px;font-family:"Nunito",sans-serif;font-size:14px;font-weight:800;padding:7px 24px;cursor:pointer;margin-top:8px;transition:all 0.15s;';
  var rollStyle=baseBtn+'background:rgba(78,205,196,0.18);border:1.5px solid rgba(78,205,196,0.5);color:#4ecdc4;';
  var standStyle=baseBtn+'background:rgba(255,107,107,0.18);border:1.5px solid rgba(255,107,107,0.5);color:#ff6b6b;';
  document.getElementById('gameArea').innerHTML=
    '<div style="text-align:center;width:100%;">'+
    '<div style="font-size:15px;font-weight:700;color:rgba(255,255,255,0.75);margin-bottom:10px;">Rolls left: '+DR+' — tap dice to hold</div>'+
    '<div style="font-size:14px;color:#4ecdc4;font-weight:700;margin-bottom:10px;">Your hand: <span style="color:#fff;">'+hand+'</span></div>'+
    '<div class="dice-row" style="margin-bottom:14px;">'+
      DD.map(function(v,i){return'<div class="die'+(DH[i]?' held':'')+'" onclick="dpTog('+i+')">'+DICE[v-1]+'</div>';}).join('')+
    '</div>'+
    '<div style="display:flex;justify-content:center;gap:10px;margin-bottom:10px;">'+
      (DR>0?'<button class="roll-btn" onclick="dpRoll(false)">Roll Again 🎲</button>':'')+
      '<button class="stand-btn" onclick="dpStand()">Stand — See House 🤚</button>'+
    '</div>'+
    '<button class="play-again-btn" onclick="renderDP()">New Game</button>'+
    '</div>';
}
function dpTog(i){if(DPPHASE!=='rolling')return;DH[i]=!DH[i];drawDP();}
function dpStand(){
  HHOUSE=[1,1,1,1,1].map(function(){return Math.floor(Math.random()*6)+1;});
  var hHeld=dpBestHold(HHOUSE);
  HHOUSE=HHOUSE.map(function(v,i){return hHeld[i]?v:Math.floor(Math.random()*6)+1;});
  DPPHASE='result';dpShowResult();
}
function dpBestHold(dice){
  var ct={};dice.forEach(function(v){ct[v]=(ct[v]||0)+1;});
  var maxC=Math.max.apply(null,Object.values(ct));
  var keepVal=parseInt(Object.keys(ct).filter(function(k){return ct[k]===maxC;}).sort(function(a,b){return b-a;})[0]);
  return dice.map(function(v){return v===keepVal;});
}
function dpShowResult(){
  var pH=dpHand(DD),hH=dpHand(HHOUSE);
  var pPts=dpPts(pH),hPts=dpPts(hH);
  var result,col;
  if(pPts>hPts){result='You Win! 🎉';col='#4ecdc4';}
  else if(hPts>pPts){result='House Wins! 😅';col='#ff6b6b';}
  else{result="It's a Tie! 🤝";col='#ffd700';}
  document.getElementById('gameArea').innerHTML=
    '<div style="text-align:center;width:100%;">'+
    '<div class="ribbon-name" style="color:'+col+';font-size:24px;margin-bottom:8px;">'+result+'</div>'+
    '<div style="display:flex;justify-content:center;gap:14px;align-items:flex-start;">'+
      '<div>'+
        '<div class="dp-section-label" style="color:#4ecdc4;margin-bottom:4px;">YOU</div>'+
        '<div class="dice-row" style="gap:4px;">'+DD.map(function(v){return'<div class="die" style="width:42px;height:42px;font-size:22px;cursor:default;">'+DICE[v-1]+'</div>';}).join('')+'</div>'+
        '<div style="color:#4ecdc4;font-size:13px;font-weight:700;margin-top:4px;">'+pH+'</div>'+
      '</div>'+
      '<div style="color:rgba(255,255,255,0.4);font-family:\'Fredoka One\',cursive;font-size:20px;padding-top:20px;">VS</div>'+
      '<div>'+
        '<div class="dp-section-label" style="color:#ff6b6b;margin-bottom:4px;">HOUSE</div>'+
        '<div class="dice-row" style="gap:4px;">'+HHOUSE.map(function(v){return'<div class="die house-die" style="width:42px;height:42px;font-size:22px;">'+DICE[v-1]+'</div>';}).join('')+'</div>'+
        '<div style="color:#ff6b6b;font-size:13px;font-weight:700;margin-top:4px;">'+hH+'</div>'+
      '</div>'+
    '</div>'+
    '<button class="play-again-btn" onclick="renderDP()">Play Again</button>'+
    '</div>';
}
function dpHand(dice){
  var ct={};dice.forEach(function(v){ct[v]=(ct[v]||0)+1;});
  var vl=Object.values(ct).sort(function(a,b){return b-a;});
  var sr=dice.slice().sort(function(a,b){return a-b;});
  var isSt=sr.every(function(v,i){return i===0||v===sr[i-1]+1;});
  if(vl[0]===5)return'Five of a Kind!';if(vl[0]===4)return'Four of a Kind!';
  if(vl[0]===3&&vl[1]===2)return'Full House!';if(isSt)return'Straight!';
  if(vl[0]===3)return'Three of a Kind';if(vl[0]===2&&vl[1]===2)return'Two Pair';
  if(vl[0]===2)return'One Pair';return'High Card';
}
function dpPts(h){
  if(h==='Five of a Kind!')return 7;if(h==='Four of a Kind!')return 6;
  if(h==='Full House!')return 5;if(h==='Straight!')return 4;
  if(h==='Three of a Kind')return 3;if(h==='Two Pair')return 2;
  if(h==='One Pair')return 1;return 0;
}

function renderWS(){var p=WORDS[Math.floor(Math.random()*WORDS.length)];WW=p.w;WH=p.h;WA=3;drawWS('');}
function drawWS(msg){

    '<div class="status-msg">'+(msg||'Unscramble the word!')+'</div>'+
    '<div class="ws-scramble" style="background:#8a9ab0;border-radius:14px;padding:8px 14px;display:inline-block;color:#1a2a4a;">'+wsScr(WW)+'</div>'+
    '<div style="font-size:16px;color:rgba(255,255,255,0.6);font-weight:600;text-align:center;margin-top:6px;">Hint: '+WH+'</div>'+
    '<div style="font-size:13px;color:rgba(255,255,255,0.4);text-align:center;margin-bottom:6px;">Attempts left: '+WA+'</div>'+
    '<input class="ws-input" id="wI" maxlength="'+WW.length+'" placeholder="'+'?'.repeat(WW.length)+'" style="background:#1e3a5f;border:1.5px solid #2a5080;" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key===\'Enter\')wsChk()">'+
    '<button class="ws-submit" onclick="wsChk()">Submit ✓</button>'+
    '<button class="play-again-btn" onclick="renderWS()">New Word</button>'+
    '</div>';
  setTimeout(function(){var i=document.getElementById('wI');if(i)i.focus();},100);
}
function wsChk(){var inp=document.getElementById('wI');if(!inp)return;var v=inp.value.toUpperCase().trim();if(v===WW){document.getElementById('gameArea').innerHTML='<div style="text-align:center;"><div class="ribbon-icon">🎉</div><div class="ribbon-name" style="color:#4ecdc4">Correct!</div><div class="ribbon-sub">'+WW+' — '+WH+'</div></div><button class="play-again-btn" onclick="renderWS()">New Word</button>';return;}WA--;if(WA<=0){document.getElementById('gameArea').innerHTML='<div style="text-align:center;"><div class="ribbon-icon">😅</div><div class="ribbon-name" style="color:#ff6b6b">The word was '+WW+'</div><div class="ribbon-sub">'+WH+'</div></div><button class="play-again-btn" onclick="renderWS()">New Word</button>';return;}drawWS('Not quite! '+WA+' attempt'+(WA>1?'s':'')+' left');}

init();

/* ── SWIPE NAVIGATION ── */
(function(){
  var tx=0,ty=0,dragging=false;
  var el=document.getElementById('gameArea')||document.querySelector('.scrim')||document.body;
  document.addEventListener('touchstart',function(e){
    tx=e.touches[0].clientX;ty=e.touches[0].clientY;dragging=true;
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(!dragging)return;dragging=false;
    var dx=e.changedTouches[0].clientX-tx;
    var dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){
      if(dx>0&&curDay>-7)changeDay(-1);   // swipe right = go back
      else if(dx<0&&curDay<0)changeDay(1); // swipe left = go forward
    }
  },{passive:true});
})();

</script>
</body>
</html>
